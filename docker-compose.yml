services:
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "5432:5432"
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  authentication-service:
    build: .
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth
      DB_PASSWORD: auth
      JWT_SECRET: "change-me-in-production-use-long-random-secret-key-256bits!!"
      JWT_TTL_SECONDS: "3600"
      JWT_REFRESH_TTL_SECONDS: "604800"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"

volumes:
  auth_pg_data:
