spring.application.name=authentication-service
spring.profiles.default=dev

# --- API ---
server.port=8080
server.forward-headers-strategy=framework
spring.mvc.problemdetails.enabled=false
# No exponer stack traces en respuestas de error genéricas (/error)
spring.web.error.include-stacktrace=never

# --- Seguridad HTTP (cabeceras, rate limit login, HSTS solo HTTPS) ---
app.security.hsts-enabled=${SECURITY_HSTS_ENABLED}
app.security.login-rate-limit-per-minute=${LOGIN_RATE_LIMIT}

# --- Persistencia común ---
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT (usar variables de entorno en producción) ---
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-ttl-seconds=${JWT_TTL_SECONDS}
app.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL_SECONDS}

# --- CORS restrictivo (lista explícita) ---
app.cors.allowed-origins=${CORS_ORIGINS}

# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logs estructurados (consola; traceId desde filtro) ---
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%t] traceId=%X{traceId:-} %logger{36} - %m%n
