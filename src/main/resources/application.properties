spring.application.name=authentication-service

# --- API ---
server.port=8080
spring.mvc.problemdetails.enabled=false
# No exponer stack traces en respuestas de error genéricas (/error)
server.error.include-stacktrace=never

# --- Seguridad HTTP (cabeceras, rate limit login, HSTS solo HTTPS) ---
app.security.hsts-enabled=${SECURITY_HSTS_ENABLED:false}
app.security.login-rate-limit-per-minute=${LOGIN_RATE_LIMIT:30}

# --- PostgreSQL (BD dedicada del microservicio) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- JWT (usar variables de entorno en producción) ---
app.jwt.secret=${JWT_SECRET:change-me-in-production-use-long-random-secret-key-256bits!!}
app.jwt.access-token-ttl-seconds=${JWT_TTL_SECONDS:3600}
app.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:604800}

# --- CORS restrictivo (lista explícita) ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# --- RabbitMQ (dependencia del proyecto; este MS no declara exchanges/colas: ya existen en el broker) ---
# Solo evita arrancar listeners; la conexión puede usarse para publicación futura.
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL:false}
spring.rabbitmq.listener.simple.auto-startup=false

# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logs estructurados (consola; traceId desde filtro) ---
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%t] traceId=%X{traceId:-} %logger{36} - %m%n
